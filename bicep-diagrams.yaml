# Graphical styles
#

styles:

  # Style pour le cluster principal (VNet / VpcId)
  Network:
    bgcolor: "#f2e6ff" # Mauve clair
    color: "#000000"
    label: "VpcId"

  # Styles Champions League - Nœuds de tournoi (legacy names for compatibility)
  QuarterFinalNode:
    bgcolor: "#0d1b2a"
    color: "#64b5f6"

  SemiFinalNode:
    bgcolor: "#1a237e"
    color: "#90caf9"

  FinalNode:
    bgcolor: "#b71c1c"
    color: "#ffcdd2"

  # Styles Champions League - Configuration par rôle (utilise les tags du Bicep)
  TrophyStyle:
    bgcolor: "#ffd700"
    color: "#000000"

  FinalStyle:
    bgcolor: "#b71c1c"
    color: "#ffcdd2"

  SemifinalStyle:
    bgcolor: "#1a237e"
    color: "#90caf9"

  QuarterfinalStyle:
    bgcolor: "#0d1b2a"
    color: "#64b5f6"

  DefaultTeamStyle:
    bgcolor: "#1a1a2e"
    color: "#ffffff"

  # Style pour les clusters de sécurité (NSG)
  SecurityGroup:
    bgcolor: "#fff5e6" # Beige / Orange clair
    color: "#000000"

  # Style pour les flèches
  DependsOn:
    color: "#7B8894" # Gris foncé
    style: "solid"

  # Styles pour le diagramme de football/sports
  MainContainer:
    bgcolor: "#1a1a2e"
    color: "#ffd700"
    label: "CHAMPIONS LEAGUE 2016"

  TitleStyle:
    bgcolor: "#0f3460"
    color: "#ffd700"
    label: "CHAMPIONS LEAGUE"

  BundesligaStyle:
    bgcolor: "#e94560"
    color: "#ffffff"
    label: "BUNDESLIGA"

  QualifiedStyle:
    bgcolor: "#16213e"
    color: "#00ff88"
    label: "QUALIFIÉS"

  TeamNode:
    bgcolor: "#1a1a2e"
    color: "#ffffff"

  TrophyNode:
    bgcolor: "#ffd700"
    color: "#000000"



resources:

  # RÉSEAU - Virtual Networks (Cluster)
  # Les VNets sont des clusters car ils peuvent contenir d'autres ressources (subnets, NICs)
  Microsoft.Network/virtualNetworks:
    kind: cluster
    style: Network
    icon:
      classname: diagrams.azure.networking.VirtualNetworks
      # path: '/icons/vnet.png'  # Icône alternative si classname échoue

  # RÉSEAU - Network Security Groups (Cluster)
  # NSGs sont des clusters pour les règles de sécurité
  Microsoft.Network/networkSecurityGroups:
